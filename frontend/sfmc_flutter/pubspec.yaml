name: sfmc_flutter
description: Application SFMC Bénin - Gestion industrielle
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2                 # ← Reste sur 0.19.0 pour compatibilité
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  go_router: ^17.2.2
  fl_chart: ^1.2.0
  data_table_2: ^2.5.0
  badges: ^3.1.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.0
  image_picker: ^1.0.0
  pdf: ^3.10.0
  printing: ^5.12.0
  path_provider: ^2.1.0
  dio: ^5.4.0
  connectivity_plus: ^7.1.1
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.2.0
  animations: ^2.0.0
  cached_network_image: ^3.3.0
  pull_to_refresh: ^2.0.0
  dropdown_search: ^7.0.0
  syncfusion_flutter_charts: ^33.2.3 
  excel: ^4.0.0
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf